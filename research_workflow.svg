<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 1120" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrowDash" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9E7B4F"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="820" height="1120" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="410" y="42" text-anchor="middle" font-size="23" font-weight="700" fill="#3E2723">Research Workflow — Coffee Bean Quality Detection</text>
  <text x="410" y="68" text-anchor="middle" font-size="14" fill="#6D4C41">Application &amp; Comparison of Object Detection Models (YOLO, Faster R-CNN, SSD) · CRISP-DM Framework</text>

  <!-- ============ STAGE 1 ============ -->
  <rect x="180" y="90" width="520" height="120" rx="12" fill="#FBF6F1" stroke="#5D4037" stroke-width="2.5"/>
  <circle cx="180" cy="150" r="24" fill="#5D4037"/>
  <text x="180" y="158" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">1</text>
  <text x="232" y="126" font-size="17" font-weight="700" fill="#2b2b2b">Business Understanding</text>
  <text x="232" y="150" font-size="12.5" fill="#444">Manual coffee-bean grading is slow, subjective, and weak when</text>
  <text x="232" y="169" font-size="12.5" fill="#444">several beans of different quality appear in one image</text>
  <text x="232" y="188" font-size="12.5" fill="#444">&#8594; goal: build an automated object-detection system.</text>

  <!-- ============ STAGE 2 ============ -->
  <rect x="180" y="256" width="520" height="120" rx="12" fill="#FBF6F1" stroke="#6D4C41" stroke-width="2.5"/>
  <circle cx="180" cy="316" r="24" fill="#6D4C41"/>
  <text x="180" y="324" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">2</text>
  <text x="232" y="292" font-size="17" font-weight="700" fill="#2b2b2b">Data Understanding</text>
  <text x="232" y="316" font-size="12.5" fill="#444">USK-Coffee dataset (Febriana et al.): ~8,000 Arabica green-bean</text>
  <text x="232" y="335" font-size="12.5" fill="#444">images, 4 classes — defect, longberry, peaberry, premium —</text>
  <text x="232" y="354" font-size="12.5" fill="#444">captured under controlled, uniform conditions.</text>

  <!-- ============ STAGE 3 ============ -->
  <rect x="180" y="422" width="520" height="120" rx="12" fill="#FBF6F1" stroke="#795548" stroke-width="2.5"/>
  <circle cx="180" cy="482" r="24" fill="#795548"/>
  <text x="180" y="490" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">3</text>
  <text x="232" y="458" font-size="17" font-weight="700" fill="#2b2b2b">Data Preparation</text>
  <text x="232" y="482" font-size="12.5" fill="#444">Download &#8594; inspect &amp; organize &#8594; annotate bounding boxes in</text>
  <text x="232" y="501" font-size="12.5" fill="#444">Roboflow &#8594; augment &#8594; export to YOLO (.txt) and COCO (.json).</text>
  <text x="232" y="520" font-size="12.5" fill="#444">Split 60:20:20 &#8594; 4,692 / 1,600 / 1,599 images.</text>

  <!-- ============ STAGE 4 ============ -->
  <rect x="180" y="588" width="520" height="120" rx="12" fill="#F1F7F1" stroke="#2E7D32" stroke-width="2.5"/>
  <circle cx="180" cy="648" r="24" fill="#2E7D32"/>
  <text x="180" y="656" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">4</text>
  <text x="232" y="624" font-size="17" font-weight="700" fill="#2b2b2b">Modeling</text>
  <text x="232" y="648" font-size="12.5" fill="#444">Train YOLOv8, Faster R-CNN (ResNet50-FPN) and SSD300 (VGG16)</text>
  <text x="232" y="667" font-size="12.5" fill="#444">on Google Colab (Tesla T4), 50 epochs each; plus mosaic-</text>
  <text x="232" y="686" font-size="12.5" fill="#444">augmentation retraining for multi-object detection.</text>

  <!-- ============ STAGE 5 ============ -->
  <rect x="180" y="754" width="520" height="120" rx="12" fill="#FEF4E8" stroke="#EF6C00" stroke-width="2.5"/>
  <circle cx="180" cy="814" r="24" fill="#EF6C00"/>
  <text x="180" y="822" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">5</text>
  <text x="232" y="790" font-size="17" font-weight="700" fill="#2b2b2b">Evaluation</text>
  <text x="232" y="814" font-size="12.5" fill="#444">Compare models with mAP, Precision, Recall, IoU, inference time</text>
  <text x="232" y="833" font-size="12.5" fill="#444">and confusion matrix (single- &amp; multi-object).</text>
  <text x="232" y="852" font-size="12.5" fill="#444">Select the best model &#8594; Faster R-CNN.</text>

  <!-- ============ STAGE 6 ============ -->
  <rect x="180" y="920" width="520" height="120" rx="12" fill="#EAF1FB" stroke="#1565C0" stroke-width="2.5"/>
  <circle cx="180" cy="980" r="24" fill="#1565C0"/>
  <text x="180" y="988" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">6</text>
  <text x="232" y="956" font-size="17" font-weight="700" fill="#2b2b2b">Deployment</text>
  <text x="232" y="984" font-size="12.5" fill="#444">Serve the best model (Faster R-CNN) as an interactive Streamlit</text>
  <text x="232" y="1003" font-size="12.5" fill="#444">web application for automated coffee-bean quality detection.</text>

  <!-- ============ DOWN ARROWS ============ -->
  <line x1="440" y1="210" x2="440" y2="254" stroke="#555" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="440" y1="376" x2="440" y2="420" stroke="#555" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="440" y1="542" x2="440" y2="586" stroke="#555" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="440" y1="708" x2="440" y2="752" stroke="#555" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="440" y1="874" x2="440" y2="918" stroke="#555" stroke-width="2.2" marker-end="url(#arrow)"/>

  <!-- ============ FEEDBACK / ITERATION ARROWS ============ -->
  <!-- Evaluation -> Modeling -->
  <path d="M700,806 C758,806 758,806 758,648 L702,648" fill="none" stroke="#9E7B4F" stroke-width="2" stroke-dasharray="6,5" marker-end="url(#arrowDash)"/>
  <text x="768" y="730" font-size="11.5" fill="#9E7B4F" transform="rotate(90 768 730)" text-anchor="middle">iterate / refine model</text>

  <!-- Evaluation -> Data Preparation -->
  <path d="M700,822 C792,822 792,822 792,482 L702,482" fill="none" stroke="#9E7B4F" stroke-width="2" stroke-dasharray="6,5" marker-end="url(#arrowDash)"/>
  <text x="802" y="652" font-size="11.5" fill="#9E7B4F" transform="rotate(90 802 652)" text-anchor="middle">revisit data</text>

  <!-- Footer -->
  <text x="410" y="1078" text-anchor="middle" font-size="11" fill="#9e9e9e">Lian Wira Manuel Maharaja · 00000075938 · Information Systems, Universitas Multimedia Nusantara</text>
</svg>
